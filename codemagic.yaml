# Codemagic CI — Android build (APK + AAB) for the Uellow Reviewers app.
# Build is started manually from the Codemagic UI.
#
# Before the first run, in Codemagic UI add a variable GROUP named exactly:
#   reviewers_signing
# containing (Secure):
#   UELLOW_KEYSTORE_BASE64    — the upload keystore (.jks) as one Base64 line
#   UELLOW_KEYSTORE_PASSWORD  — keystore password
#   UELLOW_KEY_ALIAS          — key alias inside the keystore
#
workflows:
  android-release:
    name: Reviewers — Android (APK + AAB)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: 3.29.3                       # same SDK as the fleet (16KB)
      groups:
        - reviewers_signing
      vars:
        UELLOW_SIGN: "upload"               # sign with the upload key (not debug)
        UELLOW_KEYSTORE_PATH: "/tmp/upload.jks"
    scripts:
      - name: Decode signing keystore
        script: |
          if [ -z "$UELLOW_KEYSTORE_BASE64" ]; then
            echo "UELLOW_KEYSTORE_BASE64 is empty — add it to the 'reviewers_signing' group in Codemagic."
            exit 1
          fi
          echo "$UELLOW_KEYSTORE_BASE64" | base64 --decode > "$UELLOW_KEYSTORE_PATH"
          echo "keystore -> $UELLOW_KEYSTORE_PATH ($(wc -c < $UELLOW_KEYSTORE_PATH) bytes)"
      - name: Flutter packages get
        script: |
          flutter pub get
      - name: Build signed APK + AAB
        script: |
          flutter build apk --release
          flutter build appbundle --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab

  # ───────────────────────── iOS (needs Apple setup) ─────────────────────────
  # An iOS build for this app needs its OWN Apple App ID + distribution
  # certificate/profile (like the main app). After creating the App ID on
  # developer.apple.com and linking an App Store Connect API key in Codemagic,
  # add an `ios-release` workflow mirroring uellow_app/codemagic.yaml.
