plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
}

android {
    namespace = "com.uellow.uellow_reviewers_app"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.uellow.uellow_reviewers_app"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    // Google Play upload signing — used ONLY when UELLOW_SIGN=upload (CI).
    // Direct/local builds stay debug-signed so `flutter run --release` works.
    signingConfigs {
        upload {
            def ciStore = System.getenv('UELLOW_KEYSTORE_PATH')
            if (ciStore != null && !ciStore.isEmpty()) {
                storeFile file(ciStore)
                storePassword System.getenv('UELLOW_KEYSTORE_PASSWORD') ?: ''
                keyAlias System.getenv('UELLOW_KEY_ALIAS') ?: 'upload'
                keyPassword (System.getenv('UELLOW_KEY_PASSWORD')
                    ?: System.getenv('UELLOW_KEYSTORE_PASSWORD') ?: '')
            }
        }
    }

    buildTypes {
        release {
            signingConfig = (System.getenv('UELLOW_SIGN') == 'upload')
                ? signingConfigs.upload : signingConfigs.debug
        }
    }
}

flutter {
    source = "../.."
}
